baseURL = 'https://seleniums.top/'
languageCode = 'en-us'
title = 'Selenium Lab'
theme = 'PaperMod'

[params]
    env = 'production'
    description = 'Tech blogging, Windows customization, and Cybersecurity insights.'
    ShowReadingTime = true
    ShowShareButtons = true
    ShowToc = true

    [params.homeInfoParams]
        Title = "Welcome to Selenium Lab"
        Content = "Exploring High-End Hardware, Windows Customization, and Cybersecurity."

    # We use a custom name here to avoid the "author" keyword conflict
    [params.profile]
        name = "Kawsar"
        bio = "Cybersecurity student and tech enthusiast."

[params.assets]
    favicon = "favicon.ico"
    favicon16x16 = "favicon.ico"
    favicon32x32 = "favicon.ico"
    apple_touch_icon = "favicon.ico"
